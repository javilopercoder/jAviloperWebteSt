<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ test_name }} - Test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <header>
        <h1 id="test-title">{{ test_name }}</h1>
    </header>

    <main>
        <section class="test-questions">
            <section id="test-progress" class="test-progress" aria-label="Progreso del test">
                <div class="progress-head">
                    <p id="question-counter">Pregunta 1 de 65</p>
                    <div class="progress-tools">
                        <p id="answered-counter">Respondidas: 0</p>
                        <button id="translate-es" type="button">Traducir al español</button>
                    </div>
                </div>
                <div class="progress-track" aria-hidden="true">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div class="progress-legend" aria-hidden="true">
                    <span><i class="dot current"></i>Actual</span>
                    <span><i class="dot answered"></i>Respondida</span>
                    <span><i class="dot marked"></i>Marcada</span>
                </div>
                <div id="question-grid" class="question-grid" aria-label="Navegacion por preguntas"></div>
            </section>

            <form id="test-form">
                <!-- Se renderiza una pregunta por vez -->
            </form>

            <div class="navigation-buttons" aria-label="Controles de navegacion">
                <button id="prev-question" type="button">Anterior</button>
                <button id="mark-question" type="button" aria-pressed="false">Marcar para revisar</button>
                <button id="next-question" type="button">Siguiente</button>
            </div>

            <div id="result-container" style="display: none;"></div>

            <div class="exam-action">
                <button id="submit-test" type="button">Terminar examen</button>
                <button id="copy-all-qa" type="button" style="display: none;">Copiar todas preguntas y respuestas</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; javilopercoder 2024</p>
    </footer>

    <!-- Archivos JavaScript de la carpeta static/js -->
    <script src="{{ url_for('static', filename='js/csvLoader.js') }}"></script>
    <script src="{{ url_for('static', filename='js/results.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Cargar las preguntas desde el backend -->
    <script>
        loadTestQuestions("{{ test_name }}");
    </script>

    <!-- JavaScript para actualizar el título del encabezado -->
    <script>
        // Formatear el nombre del test y actualizar el h1
        const testTitle = document.getElementById("test-title");
        testTitle.textContent = testTitle.textContent
            .replace(/_/g, " ") // Reemplaza guiones bajos por espacios
            .replace(/\b\w/g, char => char.toUpperCase()); // Capitaliza cada palabra
    </script>

    <!-- JavaScript adicional para detectar el desplazamiento de la página -->
    <script>
        window.addEventListener('scroll', function() {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.classList.add('shrink');
            } else {
                header.classList.remove('shrink');
            }
        });
    </script>
</body>
</html>
